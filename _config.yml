title: IDNTEQ
description: >-
  IDNTEQ — payment technology consulting, free online EMV and payment
  cryptography tools (certificate parsing and validation, RSA, key component
  XOR with KCV, DES parity, CPS file parsing), and a blog on payments and
  software engineering.
url: "https://www.idnteq.net"
lang: en
markdown: kramdown

# for atom feed
author:
  name: Luit Simon Adrianus de Haan
  email: adriaan@idnteq.net

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections_dir: all_collections
collections:
  posts:
    output: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/
exclude: ["sitemap.xml", "feed.xml", "LICENSE", "README.md"]
